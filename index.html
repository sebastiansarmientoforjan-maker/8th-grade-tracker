<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8th Grade Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDKs for a real-life app -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        
        // This is a placeholder. You will replace this with your own config.
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.googleProvider = new GoogleAuthProvider();
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.signInWithPopup = signInWithPopup;
        window.onAuthStateChanged = onAuthStateChanged;
        window.signOut = signOut;
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    'use strict';
    
    // A custom alert/message box component to avoid window.alert()
    function MessageBox({ message, onClose }) {
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-gray-900 bg-opacity-50">
          <div className="bg-white p-6 rounded-lg shadow-xl w-full max-w-sm text-center">
            <p className="text-gray-800 mb-4">{message}</p>
            <button
              onClick={onClose}
              className="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700"
            >
              OK
            </button>
          </div>
        </div>
      );
    }
    
    // Main application component
    function App() {
      const classes = ['8A1', '8A2', '8R1', '8R2', '8R3', '8R4'];
      const classColors = {
        '8A1': 'bg-red-500',
        '8A2': 'bg-orange-500',
        '8R1': 'bg-yellow-500',
        '8R2': 'bg-green-500',
        '8R3': 'bg-blue-500',
        '8R4': 'bg-indigo-500',
      };
    
      const [currentWeekStart, setCurrentWeekStart] = React.useState(() => {
        const today = new Date();
        const dayOfWeek = today.getDay();
        const diff = today.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
        const startOfWeek = new Date(today.setDate(diff));
        return startOfWeek;
      });
      const [activities, setActivities] = React.useState([]);
      const [unscheduledActivities, setUnscheduledActivities] = React.useState([]);
      const [selectedUnit, setSelectedUnit] = React.useState('All');
      const [selectedActivity, setSelectedActivity] = React.useState(null);
      const [isModalOpen, setIsModalOpen] = React.useState(false);
      const [draggedOverCell, setDraggedOverCell] = React.useState(null);
      const [message, setMessage] = React.useState('');
    
      const getWeekdays = (startDate) => {
        const weekdays = [];
        for (let i = 0; i < 5; i++) {
          const day = new Date(startDate);
          day.setDate(startDate.getDate() + i);
          weekdays.push(day);
        }
        return weekdays;
      };
    
      const weekdays = getWeekdays(currentWeekStart);
      
      const fetchActivities = async () => {
        const mockAllActivities = [
          { id: '1', title: 'U2 - Science Fair Prep', class: '8A1', date: '2025-08-20', description: 'Final project review', unit: 'Unit 2' },
          { id: '2', title: 'U1 - Math Test', class: '8R2', date: '2025-08-21', description: 'Chapter 5 test on fractions', unit: 'Unit 1' },
          { id: '3', title: 'U3 - History Presentation', class: '8R4', date: '2025-08-22', description: 'Group presentations on World War I', unit: 'Unit 3' },
          { id: '4', title: 'U1 - Reading Homework', class: '8A2', date: '2025-08-19', description: 'Finish Chapter 3', unit: 'Unit 1' },
          { id: '5', title: 'U4 - Art Project', class: '8R1', date: '2025-08-23', description: 'Draw a still life', unit: 'Unit 4' },
          { id: '6', title: 'U2 - Review for Mid-Term', class: '8R3', date: '2025-08-20', description: 'Review session for all subjects', unit: 'Unit 2' },
          { id: 'unsched-1', title: 'Science Lab', class: null, date: null, description: 'Experiment on plant growth', unit: 'Unit 2' },
          { id: 'unsched-2', title: 'Field Trip Form', class: null, date: null, description: 'Return signed form', unit: 'Unit 3' },
          { id: 'unsched-3', title: 'Parent-Teacher Conf.', class: null, date: null, description: 'Schedule meeting', unit: 'Unit 1' },
          { id: 'unsched-4', title: 'Library Visit', class: null, date: null, description: 'Research for history project', unit: 'Unit 3' },
          { id: 'unsched-5', title: 'Geometry Practice', class: null, date: null, description: 'Practice problems', unit: 'Unit 1' },
          { id: 'unsched-6', title: 'Book Report', class: null, date: null, description: 'Read and prepare report', unit: 'Unit 4' },
        ];
        
        const scheduled = mockAllActivities.filter(act => act.date && act.class);
        const unscheduled = mockAllActivities.filter(act => !act.date || !act.class);
    
        setActivities(scheduled);
        setUnscheduledActivities(unscheduled);
      };
      
      React.useEffect(() => {
        fetchActivities();
      }, []);
    
      const handlePreviousWeek = () => {
        setCurrentWeekStart(new Date(currentWeekStart.getFullYear(), currentWeekStart.getMonth(), currentWeekStart.getDate() - 7));
      };
      const handleNextWeek = () => {
        setCurrentWeekStart(new Date(currentWeekStart.getFullYear(), currentWeekStart.getMonth(), currentWeekStart.getDate() + 7));
      };
    
      const openModal = (activity = null) => {
        setSelectedActivity(activity);
        setIsModalOpen(true);
      };
      const closeModal = () => {
        setIsModalOpen(false);
        setSelectedActivity(null);
      };
    
      const handleSave = (activityData) => {
        if (activityData.id) {
          const isScheduled = activityData.date && activityData.class;
    
          if (isScheduled) {
            const updatedActivities = activities.map(act => act.id === activityData.id ? activityData : act);
            setActivities(updatedActivities);
          } else {
            const updatedUnscheduled = unscheduledActivities.map(act => act.id === activityData.id ? activityData : act);
            setUnscheduledActivities(updatedUnscheduled);
          }
        } else {
          const newActivity = { ...activityData, id: `new-${Date.now()}` };
          setUnscheduledActivities([...unscheduledActivities, newActivity]);
        }
        closeModal();
      };
    
      const handleDelete = (activityId) => {
        if (window.confirm('Are you sure you want to delete this activity?')) {
            setActivities(prev => prev.filter(act => act.id !== activityId));
            setUnscheduledActivities(prev => prev.filter(act => act.id !== activityId));
            closeModal();
        }
      };
    
      const handleDragStart = (e, activity) => {
        e.dataTransfer.setData("activityId", activity.id);
      };
    
      const handleDragOver = (e, date, className) => {
        e.preventDefault();
        setDraggedOverCell({ date, className });
      };
    
      const handleDragLeave = () => {
        setDraggedOverCell(null);
      };
    
      const handleDrop = (e, newDate, newClass) => {
        e.preventDefault();
        const activityId = e.dataTransfer.getData("activityId");
        
        const activityToUpdate = activities.find(act => act.id === activityId) || unscheduledActivities.find(act => act.id === activityId);
      
        if (activityToUpdate) {
          const unitNumber = activityToUpdate.unit ? activityToUpdate.unit.split(' ')[1] : '';
          const unitPrefix = unitNumber ? `U${unitNumber} - ` : '';
          
          const titleWithoutPrefix = activityToUpdate.title.includes(' - ') ? activityToUpdate.title.split(' - ')[1] : activityToUpdate.title;
          
          const updatedActivity = {
            ...activityToUpdate,
            id: `scheduled-${Date.now()}`,
            title: `${unitPrefix}${titleWithoutPrefix}`,
            date: newDate.toISOString().split('T')[0],
            class: newClass
          };
          
          setActivities(prev => [...prev, updatedActivity]);
        }
        setDraggedOverCell(null);
      };
      
      const handleUnscheduledDrop = (e) => {
        e.preventDefault();
        const activityId = e.dataTransfer.getData("activityId");
        const activityToUpdate = activities.find(act => act.id === activityId);
    
        if (activityToUpdate) {
          setActivities(prev => prev.filter(act => act.id !== activityId));
        }
      };
    
      const ActivityModal = () => {
        const [formData, setFormData] = React.useState(
          selectedActivity || {
            title: '',
            class: null,
            date: null,
            description: '',
            unit: 'Unit 1'
          }
        );
    
        const handleChange = (e) => {
          const { name, value } = e.target;
          setFormData({ ...formData, [name]: value });
        };
    
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center bg-gray-900 bg-opacity-50">
            <div className="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
              <h2 className="text-xl font-bold mb-4">{selectedActivity && selectedActivity.date ? 'Edit Scheduled Activity' : 'Add/Edit Unscheduled Activity'}</h2>
              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700">Title</label>
                  <input
                    type="text"
                    name="title"
                    value={formData.title}
                    onChange={handleChange}
                    className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700">Unit</label>
                  <select
                    name="unit"
                    value={formData.unit || ''}
                    onChange={handleChange}
                    className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                  >
                    {['Unit 1', 'Unit 2', 'Unit 3', 'Unit 4'].map(u => <option key={u} value={u}>{u}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700">Class</label>
                  <select
                    name="class"
                    value={formData.class || ''}
                    onChange={handleChange}
                    disabled={!selectedActivity || !selectedActivity.date}
                    className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 disabled:bg-gray-200 disabled:cursor-not-allowed"
                  >
                    <option value="">Unscheduled</option>
                    {classes.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700">Date</label>
                  <input
                    type="date"
                    name="date"
                    value={formData.date || ''}
                    onChange={handleChange}
                    disabled={!selectedActivity || !selectedActivity.date}
                    className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 disabled:bg-gray-200 disabled:cursor-not-allowed"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700">Description</label>
                  <textarea
                    name="description"
                    value={formData.description}
                    onChange={handleChange}
                    rows="3"
                    className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                  ></textarea>
                </div>
              </div>
              <div className="mt-6 flex justify-end space-x-3">
                {selectedActivity && (
                  <button
                    onClick={() => handleDelete(selectedActivity.id)}
                    className="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-lg hover:bg-red-700"
                  >
                    Delete
                  </button>
                )}
                <button
                  onClick={closeModal}
                  className="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-200 rounded-lg hover:bg-gray-300"
                >
                  Cancel
                </button>
                <button
                  onClick={() => handleSave(formData)}
                  className="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700"
                >
                  Save
                </button>
              </div>
            </div>
          </div>
        );
      };
    
      return (
        <div className="font-sans antialiased text-gray-800 bg-gray-100 min-h-screen p-4 flex flex-col">
          <h1 className="text-3xl font-bold text-center mb-6">8th Grade Tracker</h1>
          <div className="flex justify-end mb-4">
              <button onClick={() => window.signOut(window.auth)} className="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-200 rounded-lg hover:bg-gray-300">
                  Cerrar sesión
              </button>
          </div>
          <div className="flex-1 bg-white rounded-xl shadow-lg p-4 lg:p-6 overflow-x-auto">
            {/* Calendar Header */}
            <div className="flex justify-between items-center mb-6">
              <h2 className="text-xl font-bold md:text-2xl">{currentWeekStart.toLocaleString('default', { month: 'long', year: 'numeric' })}</h2>
              <div className="flex space-x-2">
                <button onClick={handlePreviousWeek} className="p-2 text-gray-600 rounded-full hover:bg-gray-200">
                  <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clipRule="evenodd" /></svg>
                </button>
                <button onClick={() => setCurrentWeekStart(new Date(new Date().setDate(new Date().getDate() - new Date().getDay() + (new Date().getDay() === 0 ? -6 : 1))))} className="px-3 py-1 text-sm font-medium text-gray-700 rounded-full hover:bg-gray-200">
                  Today
                </button>
                <button onClick={handleNextWeek} className="p-2 text-gray-600 rounded-full hover:bg-gray-200">
                  <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clipRule="evenodd" /></svg>
                </button>
              </div>
              <button onClick={() => openModal()} className="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">
                Add Activity
              </button>
            </div>
    
            {/* Main Content Area */}
            <div className="flex flex-col lg:flex-row space-y-4 lg:space-y-0 lg:space-x-4">
              {/* Unscheduled Activities List */}
              <div
                className="w-full lg:w-1/4 p-4 bg-gray-50 rounded-xl shadow-inner min-h-[200px]"
                onDragOver={(e) => e.preventDefault()}
                onDrop={handleUnscheduledDrop}
              >
                <h3 className="text-lg font-bold mb-2">Unscheduled Activities</h3>
                <p className="text-sm text-gray-500 mb-4">{currentWeekStart.toLocaleString('default', { month: 'long' })}</p>
                {/* Unit filter dropdown */}
                <div className="mb-4">
                  <label htmlFor="unit-filter" className="sr-only">Filter by Unit</label>
                  <select
                    id="unit-filter"
                    value={selectedUnit}
                    onChange={(e) => setSelectedUnit(e.target.value)}
                    className="block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                  >
                    <option value="All">All Units</option>
                    {['Unit 1', 'Unit 2', 'Unit 3', 'Unit 4'].map(u => (
                      <option key={u} value={u}>{u}</option>
                    ))}
                  </select>
                </div>
                <div className="space-y-2">
                  {unscheduledActivities
                    .filter(activity => selectedUnit === 'All' || activity.unit === selectedUnit)
                    .map(activity => (
                      <div
                        key={activity.id}
                        className={`p-2 text-sm rounded-lg text-white cursor-pointer transition-shadow duration-200 bg-gray-400 hover:shadow-md`}
                        onClick={() => openModal(activity)}
                        draggable
                        onDragStart={(e) => handleDragStart(e, activity)}
                      >
                        {activity.title}
                      </div>
                    ))}
                </div>
              </div>
    
              {/* Weekly Calendar Grid - Columnar View */}
              <div className="flex-1 overflow-x-auto">
                <div className="grid grid-cols-6 gap-1 min-w-[768px] border-collapse">
                  {/* Corner spacer */}
                  <div className="col-span-1"></div>
                  {/* Weekday Headers */}
                  {weekdays.map(day => (
                    <div key={day.toString()} className="text-center font-bold text-gray-600 bg-gray-100 rounded-t-lg p-2">
                      <div className="text-sm">{day.toLocaleString('default', { weekday: 'short' })}</div>
                      <div className="text-xl">{day.getDate()}</div>
                    </div>
                  ))}
    
                  {/* Class Rows */}
                  {classes.map(c => (
                    <React.Fragment key={c}>
                      {/* Class row header */}
                      <div className={`p-2 font-semibold text-white bg-gray-700 rounded-bl-lg flex items-center justify-center ${classColors[c]} text-center`}>
                        {c}
                      </div>
                      {/* Daily cells for each class */}
                      {weekdays.map(day => {
                        const dayActivities = activities.filter(act =>
                          act.date === day.toISOString().split('T')[0] && act.class === c
                        );
                        const formattedDate = day.toISOString().split('T')[0];
                        const isDraggedOver = draggedOverCell?.date === formattedDate && draggedOverCell?.className === c;
        
                        return (
                          <div
                            key={`${formattedDate}-${c}`}
                            className={`p-2 min-h-[120px] rounded-lg transition-colors duration-200 border border-gray-200 ${isDraggedOver ? 'bg-indigo-200' : ''}`}
                            onDragOver={(e) => handleDragOver(e, day, c)}
                            onDragLeave={handleDragLeave}
                            onDrop={(e) => handleDrop(e, day, c)}
                          >
                            <div className="space-y-1">
                              {dayActivities.map(activity => (
                                <div
                                  key={activity.id}
                                  className={`p-1 text-xs rounded-lg text-white cursor-pointer hover:shadow-lg transition-shadow duration-200 ${classColors[activity.class]}`}
                                  onClick={() => openModal(activity)}
                                  draggable
                                  onDragStart={(e) => handleDragStart(e, activity)}
                                >
                                  {activity.title}
                                </div>
                              ))}
                            </div>
                          </div>
                        );
                      })}
                    </React.Fragment>
                  ))}
                </div>
              </div>
            </div>
          </div>
          {isModalOpen && <ActivityModal />}
          {message && <MessageBox message={message} onClose={() => setMessage('')} />}
        </div>
      );
    }
    
    // The login screen component
    function LoginScreen({ onLogin }) {
      const [email, setEmail] = React.useState('');
      const [password, setPassword] = React.useState('');
      const [errorMessage, setErrorMessage] = React.useState('');
    
      const handleEmailLogin = async (e) => {
          e.preventDefault();
          try {
              await window.signInWithEmailAndPassword(window.auth, email, password);
          } catch (error) {
              setErrorMessage(error.message);
          }
      };
    
      const handleGoogleLogin = async () => {
          try {
              await window.signInWithPopup(window.auth, window.googleProvider);
          } catch (error) {
              setErrorMessage(error.message);
          }
      };

      return (
          <div className="fixed inset-0 z-50 flex items-center justify-center bg-gray-900 bg-opacity-50">
              <div className="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center">
                  <h2 className="text-2xl font-bold mb-4">Iniciar sesión</h2>
                  <p className="text-gray-600 mb-6">Para editar el planificador, por favor inicie sesión.</p>
                  
                  {errorMessage && (
                    <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg relative mb-4" role="alert">
                      <span className="block sm:inline">{errorMessage}</span>
                    </div>
                  )}

                  <form onSubmit={handleEmailLogin} className="space-y-4 mb-4">
                      <div>
                          <input 
                              type="email" 
                              placeholder="Correo electrónico"
                              value={email}
                              onChange={(e) => setEmail(e.target.value)}
                              className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
                              required
                          />
                      </div>
                      <div>
                          <input
                              type="password"
                              placeholder="Contraseña"
                              value={password}
                              onChange={(e) => setPassword(e.target.value)}
                              className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
                              required
                          />
                      </div>
                      <button 
                          type="submit"
                          className="w-full px-4 py-3 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors"
                      >
                          Iniciar sesión con Email
                      </button>
                  </form>
                  <div className="relative flex items-center justify-center my-4">
                      <div className="absolute inset-0 flex items-center">
                          <span className="w-full border-t border-gray-300"></span>
                      </div>
                      <div className="relative px-2 text-sm text-gray-500 bg-white">
                          o
                      </div>
                  </div>
                  <button
                      onClick={handleGoogleLogin}
                      className="w-full px-4 py-3 text-sm font-medium text-gray-700 bg-gray-200 rounded-lg hover:bg-gray-300 flex items-center justify-center space-x-2 transition-colors"
                  >
                      <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 48 48" fill="currentColor">
                          <path d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 12.9 2 4 10.9 4 22s8.9 20 20 20 20-8.9 20-20z"/>
                      </svg>
                      <span>Iniciar sesión con Google</span>
                  </button>
              </div>
          </div>
      );
    }
    
    // The main component that manages the authentication state.
    function AppWrapper() {
        const [user, setUser] = React.useState(null);
        const [authLoading, setAuthLoading] = React.useState(true);

        React.useEffect(() => {
            const unsubscribe = window.onAuthStateChanged(window.auth, firebaseUser => {
                setUser(firebaseUser);
                setAuthLoading(false);
            });
            return () => unsubscribe();
        }, []);

        if (authLoading) {
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-gray-100">
                    <div className="text-center">
                        <h2 className="text-2xl font-bold mb-2">Cargando...</h2>
                        <p className="text-gray-600">Autenticando usuario.</p>
                    </div>
                </div>
            );
        }

        if (user) {
            return <App />;
        } else {
            return <LoginScreen />;
        }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppWrapper />);
</script>

</body>
</html>
